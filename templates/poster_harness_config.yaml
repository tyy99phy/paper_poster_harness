strict: true
paths:
  runs_dir: runs
  paper_subdir: input
  assets_subdir: assets
paper:
  query: ''
  arxiv_id: ''
  paper: ''
  text_source: ''
  assets_dir: []
  out: ''
llm:
  backend: chatgpt_account
  model: gpt-5.5
  timeout: 180
  account:
    account: ''
    auth_dir: ~/.config/poster-harness/auth
    auth_file: ''
    endpoint: https://chatgpt.com/backend-api/codex/responses
    min_token_seconds: 60
    proxy: ''
  web_search:
    model: gpt-5.5
    tool_type: web_search
    allowed_domains:
    - arxiv.org
    include_sources: true
    include:
    - web_search_call.action.sources
    reasoning_effort: low
image_generation:
  backend: chatgpt_account
  model: gpt-5.5
  size: 1024x1536
  quality: high
  variants: 2
  generated_scale: 4.0
  upscale_factor: 4.0
  account:
    account: ''
    auth_dir: ~/.config/poster-harness/auth
    auth_file: ''
    endpoint: https://chatgpt.com/backend-api/codex/responses
    min_token_seconds: 60
    proxy: ''
autoposter:
  style: cms-hep
  max_figures: 8
  max_assets: 48
  min_image_width: 96
  min_image_height: 96
  render_pages: true
  extract_pdf_images: true
  recursive_assets: true
  auto_assets: true
  keep_unselected_placeholders: false
  min_detection_confidence: 0.15
  normalize_placeholder_geometry: true
  redraw_normalized_placeholders: false
  placeholder_aspect_tolerance: 0.2
  required_successes: 2
  max_candidate_batches: 3
  llm_stage_retries: 2
  layout_contract:
    enabled: true
    reject_misaligned: true
  template_critic:
    enabled: true
    require_pass: true
    max_regen_rounds: 2
    min_overall_score: 0.72
    min_artistry_score: 0.65
    min_information_density_score: 0.65
    min_placeholder_contract_score: 0.75
    extra_instructions: ''
  pdf_render_dpi: 220
  max_pages: 12
  content_mode: standard
  content_outline:
    enabled: false
    max_sections: 6
    max_facts: 28
    max_formulas: 6
    extra_instructions: ''
  storyboard:
    enabled: true
    extra_instructions: ''
  physics_quiz:
    enabled: true
    max_questions: 20
    extra_instructions: ''
  copy_deck:
    enabled: true
    max_units: 34
    extra_instructions: ''
  flowchart_rewrite:
    enabled: true
    text_char_limit: 24000
    extra_instructions: ''
  figure_layout_policy: Use the selected source asset aspect ratio as the placeholder
    aspect ratio. Do not warp square plots into wide slots or moderate wide plots
    into arbitrary poster ratios. Readability should come from allocating more absolute
    area, using wider/taller surrounding cards, or changing the card layout while
    preserving the source figure ratio.
content_modes:
  standard:
    autoposter:
      content_mode: standard
      content_outline:
        enabled: false
      copy_deck:
        max_units: 34
        extra_instructions: ''
  hep_dense:
    autoposter:
      content_mode: hep_dense
      content_outline:
        enabled: true
        max_sections: 6
        max_facts: 30
        max_formulas: 6
        extra_instructions: Increase useful information density through paper-specific
          facts and smaller text tiers, not by reducing whitespace, shrinking placeholders,
          or adding generic HEP boilerplate.
      copy_deck:
        enabled: true
        max_units: 42
        extra_instructions: 'Prefer denser but still legible microcopy: preserve current
          generous whitespace and figure sizes, but use smaller body/badge tiers for
          should/could units so more paper-specific facts survive.'
      physics_quiz:
        enabled: true
        max_questions: 20
    styles:
      generic:
        style:
          information_density: 'Paper2Poster-rich editorial density without reducing
            whitespace: 18-30 concise public information units across the poster,
            4-8 grounded fact badges, 4-6 section modules, and one compact conclusion
            strip. Use a controlled smaller text tier for optional bullets/badges/micro-callouts,
            while keeping must-level facts clearly legible. Prefer short claims and
            fact chips over paragraphs; omit lower-priority facts before sacrificing
            legibility or placeholder geometry.'
          text_density:
          - 'Compress prose into poster bullets: short noun phrases, ideally under
            11 words each.'
          - Maintain Paper2Poster-style information richness through smaller but legible
            body/badge tiers, not through crowded layouts or reduced whitespace.
          - 'Use three text scales: primary claims readable at a glance, compact bullets
            for specialist detail, and micro-badges for optional should/could facts.'
          - Avoid microscopic paragraphs, footnote blocks, dense equations, and reference
            lists in the rendered poster.
          - Prefer 2-5 bullets/fact chips per non-hero card and at most one short
            sentence per text block; preserve meaning without adding new science.
          - Use public fact chips and numeric badges for explicitly grounded dataset/result
            facts; do not invent numbers.
          - If text competes with a result figure, shrink or omit lower-priority text
            first and enlarge/preserve the figure placeholder.
      cms-hep:
        style:
          information_density: 'Paper2Poster-rich HEP density without reducing whitespace:
            preserve enough public facts for a viewer to answer what was measured/searched,
            which dataset/channel/strategy was used, what the headline result says,
            and which figures support it. Use 18-28 short bullets/fact chips total
            plus 4-8 grounded badges; increase density through a smaller but still
            legible specialist-detail tier, never by shrinking figure placeholders,
            flattening the layout, or inventing CMS numbers.'
          text_density:
          - 'Compress prose into HEP poster microcopy: short noun phrases, ideally
            under 11 words each.'
          - Maintain Paper2Poster-style information richness through smaller but legible
            specialist-detail text, not through crowded layouts or reduced whitespace.
          - 'Use three text scales: large must-level result/method claims, compact
            bullets for SR/CR/fit details, and micro-badges for optional uncertainties
            or category labels.'
          - For HEP experts, prefer concrete SR/CR, fit, selection, and uncertainty
            chips over generic analysis prose.
          - Avoid paragraphs, footnote blocks, dense equations, reference lists, and
            tiny illegible tables.
          - Use public fact chips and numeric badges only for explicitly grounded
            luminosity, energy, channel, mass/limit, or CL facts.
          - If text competes with a result figure, omit could-priority units before
            shrinking placeholders or reducing gutters.
arxiv:
  enabled: true
  download_source: true
  download_pdf: true
  source_asset_roots:
  - figures
  - figure
  - figs
  - fig
  - images
  - plots
  - graphics
  render_pdf_figures_dpi: 240
styles:
  generic:
    project: {}
    style:
      summary: premium CERN/LHCC-inspired scientific poster, modern editorial HEP
        design, artistic but readable, not a collage
      aspect: A0 vertical / 2:3 ratio
      top_band: strong title banner with concise identity text and abstract scientific
        artwork
      body_layout: 4-6 large numbered modules on a light background with one dominant
        result region, generous gutters, varied card shapes, and light paper-like
        figure cards for every chart/diagram
      color_grammar: one primary accent color for headline results and one secondary
        accent color for contrasts; all figure surfaces remain warm-white or very
        pale neutral
      art_direction: 'Editorial scientific-magazine design with layered abstract geometry
        and luminous gradients. Use atmospheric depth, subtle glow, frosted-glass
        surfaces, and carefully balanced negative space. Create a cover-story feeling:
        authoritative, beautiful, contemporary, and clearly scientific. Let abstract
        scientific forms sweep across the canvas to connect sections without becoming
        fake data. Use refined typography, micro-shadows, metallic accents, and soft
        depth cues to avoid a PPT-like template. Decorative artwork remains abstract;
        real plots, diagrams, tables, and images appear only in placeholders.'
      layout_rhythm: CERN/LHCC poster rhythm with a strong header and a clear diagonal
        or Z-shaped scan path. Anchor one hero result in the visual center of gravity,
        with supporting method and context modules around it. Use section ribbons,
        numbered tabs, circular callouts, pill headers, wide bands, tall sidebars,
        and staggered panels. Break the grid intentionally while keeping alignment
        disciplined and readable. Vary card proportions and scale so the poster has
        hierarchy rather than a uniform matrix of boxes. Generous gutters and overlapping
        translucent connector elements should create flow without clutter.
      background_texture: Soft abstract scientific network and field texture behind
        content cards, kept low contrast and atmospheric. Use faint radial gradients,
        subtle particle trails, ghosted geometric forms, and margin-only network hints.
        Texture should add depth and motion while never reading as a plot, table,
        equation, or data visualization. Keep card interiors calm enough for text
        and placeholders to stay legible. Let color temperature shift gently across
        the poster to support the reading path.
      typography: 'Modern editorial sans-serif system: Helvetica/Inter/Source-Sans-like,
        with a bold condensed title, crisp section headers, compact readable bullets,
        and restrained scientific notation. Use two weights and one accent style rather
        than many decorative fonts. Create hierarchy through scale, weight, color,
        spacing, and numbered tabs.'
      color_palette: 'Premium science palette: deep indigo or graphite atmosphere
        in the outer background, cobalt/cyan primary accents, violet/magenta secondary
        accents, restrained amber/gold highlights, and warm-white or pearl content
        cards. Text cards and figure cards should be light and calm; dark surfaces
        belong in the header, margins, frames, or accent rails.'
      figure_surface: Every scientific figure placeholder must live on a warm-white,
        pearl, or very pale blue paper-like card/mat. Never place a plot or diagram
        on a dark navy, black, purple, or saturated block. Use shadows, outlines,
        halos, and side accents for drama while keeping the chart surface light.
      information_density: 'Paper2Poster-rich editorial density: 14-24 concise public
        information units across the poster, 3-6 grounded fact badges, 4-6 section
        modules, and one compact conclusion strip. Prefer short claims and fact chips
        over paragraphs; omit lower-priority facts before sacrificing legibility or
        placeholder geometry.'
    extras:
      decorative_art_constraints:
      - Decorative artwork must remain abstract.
      - Do not draw fake plots, fake tables, or unlabeled scientific diagrams outside
        placeholders.
      forbidden_phrases:
      - internal workflow
      - production workflow
      - production-process
      - replacement
      - placeholder explanation
  cms-hep:
    project:
      audience: high-energy physics conference audience
    style:
      summary: premium high-energy-physics conference poster, CERN/LHCC-inspired,
        CMS-style detector aesthetic, luminous beamline abstraction, artistic but
        readable; not a collage
      aspect: A0 vertical / 2:3 ratio
      top_band: dark navy title band with identity area on left and a cinematic abstract
        detector/beam artwork on right
      body_layout: 'five major modules on a pale scientific background: compact shaped
        motivation/strategy cards, one dominant warm-white key-result figure card
        that preserves source aspect, and a concise summary strip'
      color_grammar: primary result = CMS blue; secondary interpretation = magenta/purple;
        limits/results = restrained gold and black accents; every plot/diagram surface
        remains warm-white or very pale neutral
      art_direction: 'Cinematic CMS-inspired detector rings rendered as luminous concentric
        forms in the background. Beamline light trails should sweep diagonally across
        the canvas with soft particle-spray atmosphere. Use glassmorphism cards with
        frosted translucency, micro-shadow depth, refined typography, and metallic
        accents. The overall feel should evoke a Nature Physics or CERN Courier cover:
        authoritative, beautiful, and unmistakably particle-physics. Use volumetric
        glow, atmospheric depth, cool CMS blues, magenta/purple contrast, and restrained
        gold highlights. Decorative art is abstract only; no literal detector diagrams,
        Feynman graphs, fake plots, or particle-labeled schematics outside placeholders.'
      layout_rhythm: Asymmetric HEP hierarchy with a clear diagonal scan path from
        top-left to bottom-right. Use a strong title banner and anchor the hero result
        near the golden-ratio zone. Section ribbons and numbered tabs should create
        wayfinding without forcing rigid PPT blocks. Use circular badges, pill-shaped
        headers, wide bands, tall sidebars, L-shaped wraps, and staggered translucent
        panels to break the grid. One dominant hero figure card should visibly outweigh
        supporting cards, while smaller diagnostic cards remain secondary. Avoid equal-size
        plot mosaics, uniformly tiled white boxes, and slide-deck symmetry.
      background_texture: Subtle luminous particle-field texture with low contrast
        behind all content cards. Use faint radial gradients emanating from the hero
        result region and ghosted detector-ring elements at very low opacity. Network
        or graph-topology hints may live in the margins but must not cross into scientific
        figure placeholders. The texture conveys atmospheric depth, not data, noise,
        or a fake event display. Color temperature may transition from deep navy and
        indigo near the header to charcoal with restrained gold warmth near the bottom.
      typography: 'CMS/CERN editorial typography: a bold condensed sans-serif title,
        clear numbered module headers, dark readable body text on light cards, and
        compact bullets. Use a disciplined type scale with strong hierarchy; avoid
        decorative display fonts except for subtle numeric badges.'
      color_palette: 'CMS-inspired premium palette: deep navy/indigo outer atmosphere,
        CMS cobalt blue, electric cyan glints, violet/magenta interpretation accents,
        restrained amber/gold result highlights, and warm-white/pearl figure cards.
        Dark colors should create cinematic depth in the header, background, frames,
        side rails, and badges, not inside figure blocks.'
      figure_surface: All scientific figure areas, including the headline limit/result
        card, must use warm-white or pearl figure-card interiors. Do not make the
        plot-containing block dark; use a light inset card/mat with subtle gray outline,
        soft shadow, and optional gold/CMS-blue outer frame. This ensures white-background
        CMS plots blend into the poster instead of looking like pasted stickers.
      information_density: 'Paper2Poster-rich HEP density: preserve enough public
        facts for a viewer to answer what was measured/searched, which dataset/channel/strategy
        was used, what the headline result says, and which figures support it. Use
        12-20 short bullets/fact chips total plus 3-6 grounded badges; never invent
        CMS numbers or shrink text to illegibility.'
    extras:
      decorative_art_constraints:
      - The title/header artwork must be abstract detector or beamline art only.
      - Do not draw Feynman diagrams in decorative areas.
      - Do not put particle labels such as mu, nu, j, q, W, N in decorative header
        artwork.
      - Do not add Feynman diagrams, interaction vertices, or physics-process diagrams
        outside labeled placeholders.
      - Simple text-only analysis workflow flowcharts are allowed only when explicitly
        specified in the poster spec.
      - Only [FIG 01]-style placeholders may contain source-figure diagram slots.
      forbidden_phrases:
      - internal workflow
      - production workflow
      - production-process
      - replacement
      - validated source
      - placeholder explanation
